<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chloé &amp; Sylvain · Carte du Feÿ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Monsieur+La+Doulaise&display=swap" rel="stylesheet">
<style>
:root {
  --cream: oklch(97.5% 0.02 100);
  --cream-deep: oklch(94.5% 0.035 95);
  --bordeaux: oklch(31% 0.13 25);
  --bordeaux-soft: oklch(38% 0.12 25);
  --terracotta: oklch(58% 0.13 45);
  --rose: oklch(76% 0.08 20);
  --olive: oklch(76% 0.1 115);
  --olive-deep: oklch(55% 0.09 115);
  --gold: oklch(82% 0.1 85);
  --gold-deep: oklch(68% 0.11 80);
  --ink: oklch(34% 0.06 30);
  --ink-soft: oklch(48% 0.05 40);
  --space-xs: 4px; --space-sm: 8px; --space-md: 16px;
  --space-lg: 24px; --space-xl: 40px; --space-2xl: 64px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: "EB Garamond", serif;
  font-size: 17px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ---------- Header ---------- */
header {
  text-align: center;
  padding: clamp(28px, 5vw, 56px) var(--space-lg) clamp(18px, 3vw, 32px);
  position: relative;
}
.lang-toggle {
  position: absolute;
  top: var(--space-md); right: var(--space-md);
  display: flex; gap: 2px;
  font-family: "Bodoni Moda", serif;
  font-size: 11px; letter-spacing: 0.18em;
}
.lang-toggle button {
  background: none; border: none; cursor: pointer;
  font: inherit; color: var(--ink-soft);
  padding: 6px 8px;
}
.lang-toggle button.active { color: var(--bordeaux); }
.lang-toggle span { color: var(--gold-deep); align-self: center; }
.eyebrow {
  font-family: "Bodoni Moda", serif;
  font-size: clamp(10px, 1.2vw, 12px);
  letter-spacing: 0.42em;
  text-transform: uppercase;
  color: var(--bordeaux);
}
h1 {
  font-family: "Monsieur La Doulaise", cursive;
  font-weight: 400;
  font-size: clamp(52px, 9vw, 96px);
  line-height: 1.1;
  color: var(--terracotta);
  margin: clamp(2px, 1vw, 10px) 0 clamp(0px, 0.5vw, 6px);
}
.venue {
  font-family: "Bodoni Moda", serif;
  font-size: clamp(11px, 1.4vw, 14px);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  color: var(--bordeaux);
}
.venue .sep { color: var(--gold-deep); padding: 0 0.4em; }
.garland {
  display: flex; justify-content: center; align-items: center;
  gap: 7px; margin-top: clamp(14px, 2.5vw, 22px);
}
.garland i {
  border-radius: 50%;
  width: 5px; height: 5px;
  background: var(--gold-deep);
}
.garland i:nth-child(3n+1) { background: var(--terracotta); width: 7px; height: 7px; }
.garland i:nth-child(4n+2) { background: var(--olive); }
.garland i:nth-child(5n) { background: var(--rose); }

/* ---------- Day tabs ---------- */
nav.days {
  display: flex; justify-content: center; flex-wrap: wrap;
  gap: var(--space-sm);
  padding: var(--space-md) var(--space-md) var(--space-lg);
  position: sticky; top: 0; z-index: 60;
  background: color-mix(in oklch, var(--cream) 92%, transparent);
  backdrop-filter: blur(6px);
}
nav.days button {
  font-family: "Bodoni Moda", serif;
  font-size: clamp(11px, 1.3vw, 13px);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 10px 18px;
  border: 1px solid color-mix(in oklch, var(--bordeaux) 35%, var(--cream));
  border-radius: 999px;
  background: transparent;
  color: var(--bordeaux);
  cursor: pointer;
  transition: background 0.25s cubic-bezier(0.22,1,0.36,1), color 0.25s, transform 0.25s;
}
nav.days button:hover { transform: translateY(-1px); }
nav.days button.active { background: var(--bordeaux); border-color: var(--bordeaux); color: var(--cream); }
nav.days button .num { font-size: 1.25em; font-weight: 600; }

/* ---------- Main layout ---------- */
main {
  display: grid;
  grid-template-columns: minmax(0, 58fr) minmax(300px, 34fr);
  gap: clamp(16px, 3vw, 40px);
  max-width: 1360px;
  margin: 0 auto;
  padding: 0 clamp(12px, 3vw, 40px) var(--space-2xl);
  align-items: start;
}

/* ---------- Map ---------- */
.map-wrap { position: sticky; top: 74px; }
.view-toggle {
  display: flex; gap: var(--space-sm);
  margin-bottom: var(--space-md);
}
.view-toggle button {
  font-family: "Bodoni Moda", serif;
  font-size: 11.5px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 9px 16px;
  border: 1px solid color-mix(in oklch, var(--terracotta) 50%, var(--cream));
  border-radius: 999px;
  background: transparent; color: var(--terracotta);
  cursor: pointer;
  transition: background 0.25s, color 0.25s;
}
.view-toggle button.active { background: var(--terracotta); border-color: var(--terracotta); color: var(--cream); }
#scene3d {
  position: relative;
  display: none;
  border: 1px solid color-mix(in oklch, var(--gold-deep) 55%, var(--cream));
  outline: 6px solid var(--cream-deep);
  background: var(--cream-deep);
  box-shadow: 0 18px 48px -24px oklch(30% 0.08 40 / 0.45);
  height: min(72vh, 640px);
  overflow: hidden;
  cursor: grab;
}
#scene3d.on { display: block; }
#scene3d canvas { display: block; }
.scene-hud {
  position: absolute; bottom: 10px; left: 10px; z-index: 10;
  display: flex; gap: 6px;
}
.scene-hud button {
  font-family: "Bodoni Moda", serif;
  font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 6px 12px;
  border: 1px solid color-mix(in oklch, var(--bordeaux) 30%, var(--cream));
  border-radius: 999px;
  background: color-mix(in oklch, var(--cream) 85%, transparent);
  color: var(--bordeaux);
  cursor: pointer;
}
.scene-hud button.on { background: var(--bordeaux); color: var(--cream); border-color: var(--bordeaux); }
#label3d {
  position: absolute; z-index: 11;
  background: var(--cream);
  border: 1px solid color-mix(in oklch, var(--gold-deep) 60%, var(--cream));
  color: var(--bordeaux);
  font-family: "Bodoni Moda", serif;
  font-size: 11.5px; letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 11px 4px; border-radius: 999px;
  white-space: nowrap; pointer-events: none;
  box-shadow: 0 4px 12px -4px oklch(30% 0.08 40 / 0.4);
  transform: translate(-50%, -140%);
  display: none;
}
.map-frame.off { display: none; }
.map-frame {
  position: relative;
  border: 1px solid color-mix(in oklch, var(--gold-deep) 55%, var(--cream));
  outline: 6px solid var(--cream-deep);
  background: var(--cream-deep);
  box-shadow: 0 18px 48px -24px oklch(30% 0.08 40 / 0.45);
}
.map-frame img { display: block; width: 100%; height: auto; user-select: none; -webkit-user-drag: none; }
.pin {
  position: absolute;
  transform: translate(-50%, -50%);
  width: clamp(24px, 2.6vw, 31px);
  height: clamp(24px, 2.6vw, 31px);
  border-radius: 50%;
  background: var(--bordeaux);
  color: var(--cream);
  border: 1.5px solid var(--cream);
  box-shadow: 0 2px 6px oklch(25% 0.08 30 / 0.4);
  font-family: "Bodoni Moda", serif;
  font-size: clamp(11px, 1.2vw, 13px);
  font-weight: 500;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.25s cubic-bezier(0.22,1,0.36,1), background 0.25s, opacity 0.3s, box-shadow 0.25s;
  z-index: 5;
}
.pin:hover { transform: translate(-50%, -50%) scale(1.22); z-index: 20; }
.pin.lit {
  background: var(--terracotta);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--gold) 70%, transparent), 0 3px 9px oklch(25% 0.08 30 / 0.45);
  z-index: 15;
}
.pin.dim { opacity: 0.28; }
.pin.selected {
  transform: translate(-50%, -50%) scale(1.3);
  background: var(--terracotta);
  box-shadow: 0 0 0 4px color-mix(in oklch, var(--gold) 80%, transparent), 0 4px 10px oklch(25% 0.08 30 / 0.5);
  z-index: 25;
}
.pin-label {
  position: absolute;
  transform: translate(-50%, 8px);
  background: var(--cream);
  border: 1px solid color-mix(in oklch, var(--gold-deep) 60%, var(--cream));
  color: var(--bordeaux);
  font-family: "Bodoni Moda", serif;
  font-size: 11.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 5px 11px 4px;
  border-radius: 999px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.25s;
  z-index: 30;
  box-shadow: 0 4px 12px -4px oklch(30% 0.08 40 / 0.4);
}
.pin-label.show { opacity: 1; }

/* ---------- Legend / filters ---------- */
.legend {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: var(--space-sm);
  padding: var(--space-md) 2px 0;
}
.legend .cap {
  font-family: "Bodoni Moda", serif;
  font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase;
  color: var(--ink-soft);
  margin-right: var(--space-xs);
}
.legend button {
  font-family: "Bodoni Moda", serif;
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 999px;
  border: 1px solid color-mix(in oklch, var(--olive-deep) 45%, var(--cream));
  background: transparent;
  color: var(--olive-deep);
  cursor: pointer;
  transition: background 0.25s, color 0.25s;
}
.legend button:hover { background: color-mix(in oklch, var(--olive) 25%, var(--cream)); }
.legend button.on { background: var(--olive-deep); border-color: var(--olive-deep); color: var(--cream); }

/* ---------- Programme ---------- */
.prog-title {
  font-family: "Bodoni Moda", serif;
  font-size: clamp(19px, 2.2vw, 25px);
  font-weight: 500;
  color: var(--bordeaux);
  letter-spacing: 0.05em;
  margin-bottom: 2px;
}
.prog-sub {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 15.5px;
  margin-bottom: var(--space-lg);
}
.event {
  display: grid;
  grid-template-columns: 74px 1fr;
  gap: var(--space-md);
  padding: 14px 10px 14px 2px;
  border-bottom: 1px dotted color-mix(in oklch, var(--gold-deep) 50%, var(--cream));
  cursor: pointer;
  border-radius: 6px;
  transition: background 0.25s;
}
.event:hover { background: color-mix(in oklch, var(--cream-deep) 65%, var(--cream)); }
.event.active { background: color-mix(in oklch, var(--gold) 22%, var(--cream)); }
.event.no-pin { cursor: default; }
.ev-time {
  font-family: "Bodoni Moda", serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--bordeaux);
  letter-spacing: 0.06em;
  padding-top: 3px;
  white-space: pre-line;
  line-height: 1.35;
}
.ev-name {
  font-size: 18px;
  font-weight: 500;
  color: var(--ink);
  display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
}
.ev-name .dot {
  width: 8px; height: 8px; border-radius: 50%;
  display: inline-block; flex: none;
  position: relative; top: -2px;
}
.ev-place {
  font-family: "Bodoni Moda", serif;
  font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--terracotta);
  margin-top: 3px;
}
.ev-place.tbd { color: var(--ink-soft); }
.ev-desc { font-size: 15px; color: var(--ink-soft); margin-top: 4px; font-style: italic; }
.chip {
  font-family: "Bodoni Moda", serif;
  font-size: 9.5px; letter-spacing: 0.14em; text-transform: uppercase;
  padding: 3px 9px 2px; border-radius: 999px;
  position: relative; top: -2px;
}
.chip.tbc { background: color-mix(in oklch, var(--rose) 45%, var(--cream)); color: var(--bordeaux-soft); }
.chip.idea { background: color-mix(in oklch, var(--olive) 35%, var(--cream)); color: var(--olive-deep); }

/* ---------- Footer ---------- */
footer {
  text-align: center;
  padding: var(--space-xl) var(--space-lg) var(--space-2xl);
}
footer .mono {
  font-family: "Monsieur La Doulaise", cursive;
  font-size: 44px;
  color: var(--gold-deep);
  line-height: 1;
}
footer p {
  font-style: italic;
  color: var(--ink-soft);
  font-size: 15px;
  margin-top: var(--space-sm);
}

/* ---------- Mobile ---------- */
@media (max-width: 900px) {
  main { grid-template-columns: 1fr; }
  .map-wrap { position: relative; top: 0; }
  .prog { padding-top: var(--space-md); }
  .event { grid-template-columns: 64px 1fr; }
}
@media (max-width: 640px) {
  .dates-sep { display: none; }
  .dates-line { display: block; margin-top: 6px; }
  nav.days { gap: 6px; }
  nav.days button { padding: 8px 12px; font-size: 10.5px; letter-spacing: 0.1em; }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition: none !important; animation: none !important; }
  html { scroll-behavior: auto; }
}
</style>
</head>

/* ============ ÉTAT ============ */
let lang = "fr";
let day = "26";
let selected = null;   // index d'événement sélectionné
let eqFilter = null;   // filtre équipement actif

/* ============ CARTE : pins ============ */
const map = document.getElementById("map");
const labels = {};
for (const [id, l] of Object.entries(LIEUX)) {
  const pin = document.createElement("button");
  pin.className = "pin";
  pin.id = "pin-" + id;
  pin.textContent = id;
  pin.style.left = l.x + "%";
  pin.style.top = l.y + "%";
  pin.setAttribute("aria-label", l.fr);
  pin.addEventListener("mouseenter", () => showLabel(id));
  pin.addEventListener("mouseleave", () => { if (selected === null || String(evLieu(selected)) !== id) hideLabel(id); });
  pin.addEventListener("click", () => pinClick(Number(id)));
  map.appendChild(pin);

  const lab = document.createElement("div");
  lab.className = "pin-label";
  lab.id = "lab-" + id;
  lab.style.left = l.x + "%";
  lab.style.top = l.y + "%";
  map.appendChild(lab);
  labels[id] = lab;
}
function showLabel(id) {
  const l = LIEUX[id];
  labels[id].textContent = l[lang];
  labels[id].classList.add("show");
  /* label au-dessus si pin en bas de carte, en dessous sinon ; ancre laterale pres des bords */
  const tx = l.x > 90 ? "-88%" : l.x < 9 ? "-12%" : "-50%";
  if (l.y > 82) { labels[id].style.transform = `translate(${tx}, calc(-100% - 26px))`; }
  else { labels[id].style.transform = `translate(${tx}, 20px)`; }
}
function hideLabel(id) { labels[id].classList.remove("show"); }
function clearLabels() { Object.keys(labels).forEach(hideLabel); }

function evLieu(i) { return EVENTS[i] && EVENTS[i].lieu; }

function pinClick(id) {
  /* si un évènement du jour courant pointe ce pin, le sélectionner */
  const idx = EVENTS.findIndex((e, i) => e.day === day && e.lieu === id);
  selectEvent(idx >= 0 ? idx : null, id);
}

/* ============ TABS ============ */
const tabsEl = document.getElementById("day-tabs");
function renderTabs() {
  tabsEl.innerHTML = "";
  for (const d of ["25", "26", "27", "cont"]) {
    const [small, big] = I18N[lang].days[d];
    const b = document.createElement("button");
    b.innerHTML = small + "&nbsp;<span class='num'>" + big + "</span>";
    if (d === day) b.classList.add("active");
    b.addEventListener("click", () => { day = d; selected = null; render(); });
    tabsEl.appendChild(b);
  }
}

/* ============ PROGRAMME ============ */
const evEl = document.getElementById("events");
function renderProg() {
  document.getElementById("prog-title").textContent = I18N[lang].progTitles[day];
  document.getElementById("prog-sub").textContent = I18N[lang].progSubs[day];
  evEl.innerHTML = "";
  EVENTS.forEach((e, i) => {
    if (e.day !== day) return;
    const row = document.createElement("div");
    row.className = "event" + (e.lieu ? "" : " no-pin") + (selected === i ? " active" : "");
    const chips = (e.tbc ? `<span class="chip tbc">${I18N[lang].tbc}</span>` : "") +
                  (e.idea ? `<span class="chip idea">${I18N[lang].idea}</span>` : "");
    const place = e.lieu
      ? `<div class="ev-place">${LIEUX[e.lieu][lang]} · n°${e.lieu}</div>`
      : `<div class="ev-place tbd">${I18N[lang].tbd}</div>`;
    const desc = e["d" + lang] ? `<div class="ev-desc">${e["d" + lang]}</div>` : "";
    row.innerHTML = `
      <div class="ev-time">${e.t}</div>
      <div>
        <div class="ev-name"><span class="dot" style="background:${TYPES[e.type]}"></span>${e[lang]} ${chips}</div>
        ${place}${desc}
      </div>`;
    if (e.lieu) row.addEventListener("click", () => selectEvent(selected === i ? null : i));
    evEl.appendChild(row);
  });
}

/* ============ SÉLECTION / FILTRES ============ */
function selectEvent(i, pinOverride) {
  selected = i;
  eqFilter = null;
  render();
  const id = i !== null ? EVENTS[i].lieu : pinOverride;
  if (id) {
    const pin = document.getElementById("pin-" + id);
    pin.classList.add("selected");
    showLabel(id);
    if (window.innerWidth <= 900 && i !== null) {
      document.querySelector(".map-frame").scrollIntoView({ behavior: "smooth", block: "center" });
    }
  }
}

const legendEl = document.getElementById("legend");
legendEl.querySelectorAll("button").forEach((b) => {
  b.addEventListener("click", () => {
    eqFilter = eqFilter === b.dataset.eq ? null : b.dataset.eq;
    selected = null;
    render();
  });
});

function paintPins() {
  clearLabels();
  for (const [id, l] of Object.entries(LIEUX)) {
    const pin = document.getElementById("pin-" + id);
    pin.classList.remove("lit", "dim", "selected");
    if (eqFilter) {
      if (l.eq.includes(eqFilter)) { pin.classList.add("lit"); showLabel(id); }
      else pin.classList.add("dim");
    }
  }
  legendEl.querySelectorAll("button").forEach((b) => b.classList.toggle("on", b.dataset.eq === eqFilter));
}

/* ============ LANGUE ============ */
function setLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.getElementById("lang-fr").classList.toggle("active", l === "fr");
  document.getElementById("lang-en").classList.toggle("active", l === "en");
  document.querySelectorAll("[data-i18n]").forEach((el) => {
    const v = I18N[l][el.dataset.i18n];
    if (v) el.innerHTML = v;
  });
  render();
}

function render() {
  renderTabs();
  renderProg();
  paintPins();
  if (selected !== null && EVENTS[selected].lieu) {
    const id = EVENTS[selected].lieu;
    document.getElementById("pin-" + id).classList.add("selected");
    showLabel(id);
  }
  if (window.map3d) window.map3d.sync({ selected: selected !== null ? EVENTS[selected].lieu : null, eqFilter, lang });
}
render();

/* ============ BASCULE 2D / 3D ============ */
let mode = "2d";
const v2dBtn = document.getElementById("v2d");
const v3dBtn = document.getElementById("v3d");
function setMode(m) {
  mode = m;
  v2dBtn.classList.toggle("active", m === "2d");
  v3dBtn.classList.toggle("active", m === "3d");
  document.getElementById("map").classList.toggle("off", m === "3d");
  document.getElementById("scene3d").classList.toggle("on", m === "3d");
  if (m === "3d") {
    if (!window.map3dReady) window.initMap3d && window.initMap3d();
    else window.map3d.resume();
  } else if (window.map3d) window.map3d.pause();
}
v2dBtn.addEventListener("click", () => setMode("2d"));
v3dBtn.addEventListener("click", () => setMode("3d"));
window.appState = () => ({ selected: selected !== null ? EVENTS[selected].lieu : null, eqFilter, lang });
window.pinClickFrom3d = (id) => pinClick(id);
window.lieuxData = LIEUX;
</script>

<script type="importmap">
{ "imports": {

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";

const C = {
  cream: 0xf6f2e2, ground: 0xf1ecd5, stone: 0xefe4cb, stoneFarm: 0xe9dcbf,
  white: 0xf6f3e8, roofChateau: 0x8e4638, roofFarm: 0xb0674a, roofOrangerie: 0xd8d2bd,
  trunk: 0x8a6a4a, leafA: 0x9aa860, leafB: 0x87995a, leafDark: 0x6d8050,
  water: 0x9fc3d2, path: 0xf3eedd, wallBrick: 0xc98d72, hedge: 0x7d8f52,
  gold: 0xd9b96a, bordeaux: 0x6e1518, terracotta: 0xc06a2e,
};

let renderer, scene, camera, controls, raycaster, pointer;
let groundPeint, groundSat, pinGroup;
const pinSprites = {};
let running = false, hoveredPin = null;

function makePinTexture(num, style) {
  const s = 128, cv = document.createElement("canvas");
  cv.width = cv.height = s;
  const g = cv.getContext("2d");
  g.clearRect(0, 0, s, s);
  g.beginPath(); g.arc(s/2, s/2, 52, 0, Math.PI*2);
  g.fillStyle = style === "lit" || style === "sel" ? "#c06a2e" : "#6e1518";
  g.fill();
  if (style === "sel" || style === "lit") {
    g.lineWidth = 7; g.strokeStyle = "#d9b96a";
    g.beginPath(); g.arc(s/2, s/2, 58, 0, Math.PI*2); g.stroke();
  }
  g.lineWidth = 5; g.strokeStyle = "#f6f2e2";
  g.beginPath(); g.arc(s/2, s/2, 52, 0, Math.PI*2); g.stroke();
  g.fillStyle = "#f6f2e2";
  g.font = "600 56px 'Bodoni Moda', serif";
  g.textAlign = "center"; g.textBaseline = "middle";
  g.fillText(String(num), s/2, s/2 + 4);
  const t = new THREE.CanvasTexture(cv);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function shapeFromPoly(poly) {
  const sh = new THREE.Shape();
  poly.forEach((p, i) => { i === 0 ? sh.moveTo(p[0], -p[1]) : sh.lineTo(p[0], -p[1]); });
  return sh;
}

function ribbon(line, w, y, color) {
  const geos = [];
  for (let i = 0; i < line.length - 1; i++) {
    const [x1, y1] = line[i], [x2, y2] = line[i+1];
    const dx = x2-x1, dy = y2-y1, len = Math.hypot(dx, dy);
    if (len < 0.5) continue;
    const g = new THREE.PlaneGeometry(len, w);
    g.rotateX(-Math.PI/2);
    g.rotateY(Math.atan2(-(-y2 - -y1), dx));
    g.translate((x1+x2)/2, y, (-y1 + -y2)/2);
    geos.push(g);
  }
  if (!geos.length) return null;
  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(mergeGeos(geos), mat);
  mesh.receiveShadow = true;
  return mesh;
}
function mergeGeos(geos) {
  let total = 0;
  geos.forEach(g => total += g.attributes.position.count);
  const merged = new THREE.BufferGeometry();
  const pos = new Float32Array(total*3), norm = new Float32Array(total*3), uv = new Float32Array(total*2);
  const idx = [];
  let vo = 0;
  geos.forEach(g => {
    pos.set(g.attributes.position.array, vo*3);
    norm.set(g.attributes.normal.array, vo*3);
    uv.set(g.attributes.uv.array, vo*2);
    const gi = g.index.array;
    for (let i = 0; i < gi.length; i++) idx.push(gi[i] + vo);
    vo += g.attributes.position.count;
  });
  merged.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  merged.setAttribute("normal", new THREE.BufferAttribute(norm, 3));
  merged.setAttribute("uv", new THREE.BufferAttribute(uv, 2));
  merged.setIndex(idx);
  return merged;
}

window.initMap3d = async function () {
  window.map3dReady = true;
  const wrap = document.getElementById("scene3d");
  const data = await (await fetch("scene.json")).json();
  const EXT = data.extent;
  const CX = (EXT.xmin+EXT.xmax)/2, CZ = -(EXT.ymin+EXT.ymax)/2;

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  wrap.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(C.cream);
  scene.fog = new THREE.Fog(C.cream, 550, 950);

  camera = new THREE.PerspectiveCamera(40, wrap.clientWidth/wrap.clientHeight, 1, 2000);
  camera.position.set(-165, 185, 205);

  controls = new OrbitControls(camera, renderer.domElement);
  controls.target.set(-15, 0, -35);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.maxPolarAngle = Math.PI * 0.46;
  controls.minDistance = 60; controls.maxDistance = 620;

  scene.add(new THREE.AmbientLight(0xfff6e0, 1.05));
  const sun = new THREE.DirectionalLight(0xffe9c4, 1.6);
  sun.position.set(-180, 260, 160);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const sc = sun.shadow.camera;
  sc.left = -280; sc.right = 280; sc.top = 280; sc.bottom = -280; sc.far = 900;
  scene.add(sun);

  /* sol : deux textures interchangeables */
  const loader = new THREE.TextureLoader();
  const mkGround = (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    const m = new THREE.Mesh(
      new THREE.PlaneGeometry(EXT.xmax-EXT.xmin, EXT.ymax-EXT.ymin),
      new THREE.MeshLambertMaterial({ map: tex })
    );
    m.rotation.x = -Math.PI/2;
    m.position.set(CX, 0, CZ);
    m.receiveShadow = true;
    return m;
  };
  groundPeint = mkGround(loader.load("assets/sol-peint.jpg"));
  groundSat = mkGround(loader.load("assets/sol-satellite.jpg"));
  groundSat.visible = false;
  scene.add(groundPeint, groundSat);
  /* assiette creme sous la scene */
  const mat = new THREE.Mesh(new THREE.CylinderGeometry(430, 430, 6, 64),
    new THREE.MeshLambertMaterial({ color: C.ground }));
  mat.position.set(CX, -3.2, CZ);
  scene.add(mat);

  /* batiments */
  const wallCols = { chateau: C.stone, farm: C.stoneFarm, wing: C.stoneFarm, orangerie: C.white, hut: 0xd9d2b8 };
  const roofCols = { chateau: C.roofChateau, farm: C.roofFarm, wing: C.roofFarm, orangerie: C.roofOrangerie, hut: 0xa8a284 };
  data.buildings.forEach(b => {
    const sh = shapeFromPoly(b.poly);
    const walls = new THREE.Mesh(
      new THREE.ExtrudeGeometry(sh, { depth: b.h, bevelEnabled: false }),
      new THREE.MeshLambertMaterial({ color: wallCols[b.kind] })
    );
    walls.rotation.x = -Math.PI/2;
    walls.castShadow = walls.receiveShadow = true;
    scene.add(walls);
    /* toit : meme empreinte legerement dilatee, en pente stylisee */
    const pts = b.poly;
    const cx = pts.reduce((s,p)=>s+p[0],0)/pts.length, cy = pts.reduce((s,p)=>s+p[1],0)/pts.length;
    const roofSh = shapeFromPoly(pts.map(p => [cx + (p[0]-cx)*1.07, cy + (p[1]-cy)*1.07]));
    const roof = new THREE.Mesh(
      new THREE.ExtrudeGeometry(roofSh, { depth: b.roof, bevelEnabled: true, bevelThickness: 1.4, bevelSize: -1.2, bevelSegments: 1 }),
      new THREE.MeshLambertMaterial({ color: roofCols[b.kind] })
    );
    roof.rotation.x = -Math.PI/2;
    roof.position.y = b.h;
    roof.castShadow = true;
    scene.add(roof);
  });

  /* pigeonnier : tour ronde + toit conique */
  const tower = new THREE.Mesh(new THREE.CylinderGeometry(3.6, 3.9, 9, 20),
    new THREE.MeshLambertMaterial({ color: C.stone }));
  tower.position.set(30.5, 4.5, -80.1);
  tower.castShadow = true;
  const cone = new THREE.Mesh(new THREE.ConeGeometry(4.6, 4.5, 20),
    new THREE.MeshLambertMaterial({ color: C.roofChateau }));
  cone.position.set(30.5, 11.2, -80.1);
  cone.castShadow = true;
  scene.add(tower, cone);

  /* eau */
  data.water.forEach(w => {
    const m = new THREE.Mesh(new THREE.ShapeGeometry(shapeFromPoly(w.poly)),
      new THREE.MeshLambertMaterial({ color: C.water }));
    m.rotation.x = -Math.PI/2; m.position.y = 0.18;
    scene.add(m);
  });

  /* chemins */
  data.paths.forEach(p => {
    const clip = p.line.filter(q => q[0] > EXT.xmin-5 && q[0] < EXT.xmax+5 && q[1] > EXT.ymin-5 && q[1] < EXT.ymax+5);
    const r = ribbon(clip, p.w, 0.08, C.path);
    if (r) scene.add(r);
  });

  /* murs du jardin clos */
  data.walls.forEach(w => {
    const r = ribbon(w.line, 0.7, 0, C.wallBrick);
    if (!r) return;
    const geo = r.geometry.clone();
    const m = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({ color: C.wallBrick }));
    m.position.y = 2.1;
    /* muret simple : deux rubans empiles pour figurer la hauteur */
    const m2 = m.clone(); m2.position.y = 1.05;
    const m3 = m.clone(); m3.position.y = 0.2;
    [m, m2, m3].forEach(x => scene.add(x));
  });

  /* arbres instancies */
  const trunkGeo = new THREE.CylinderGeometry(0.35, 0.5, 2.4, 6);
  const leafGeo = new THREE.IcosahedronGeometry(1, 1);
  const trunkMat = new THREE.MeshLambertMaterial({ color: C.trunk });
  const mkLeaves = (col) => new THREE.MeshLambertMaterial({ color: col });
  const cols = [C.leafA, C.leafB, C.leafDark];
  const groupsByCol = [[], [], []];
  data.trees.forEach((t, i) => groupsByCol[i % 3].push(t));
  groupsByCol.forEach((list, gi) => {
    if (!list.length) return;
    const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, list.length);
    const leaves = new THREE.InstancedMesh(leafGeo, mkLeaves(cols[gi]), list.length);
    const M = new THREE.Matrix4();
    list.forEach((t, i) => {
      const [x, y, h] = t;
      M.makeTranslation(x, 1.2, -y);
      trunks.setMatrixAt(i, M);
      const s = h * 0.55;
      M.makeScale(s, s*0.92, s).setPosition(x, 2 + s*0.72, -y);
      leaves.setMatrixAt(i, M);
    });
    trunks.castShadow = leaves.castShadow = true;
    scene.add(trunks, leaves);
  });

  /* tentes glamping */
  const tentGeo = new THREE.SphereGeometry(2.6, 14, 10, 0, Math.PI*2, 0, Math.PI/2);
  const tentMat = new THREE.MeshLambertMaterial({ color: 0xf3efe0 });
  data.tents.forEach(t => {
    const m = new THREE.Mesh(tentGeo, tentMat);
    m.position.set(t[0], 0.1, -t[1]);
    m.castShadow = true;
    scene.add(m);
  });

  /* labyrinthe stylise : anneaux de haies au pin 15 */
  const p15 = data.pins.find(p => p.n === 15);
  [7, 4.6, 2.4].forEach((r, i) => {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(r, 0.8, 8, 40, Math.PI * (1.55 + i*0.12)),
      new THREE.MeshLambertMaterial({ color: C.hedge }));
    ring.rotation.x = -Math.PI/2;
    ring.position.set(p15.x, 0.9, -p15.y);
    ring.castShadow = true;
    scene.add(ring);
  });

  /* sonic sphere : sphere filaire doree */
  const p14 = data.pins.find(p => p.n === 14);
  const sph = new THREE.Mesh(new THREE.IcosahedronGeometry(4.5, 1),
    new THREE.MeshBasicMaterial({ color: C.gold, wireframe: true }));
  sph.position.set(p14.x, 4.8, -p14.y);
  scene.add(sph);

  /* petanque : cercle de sable */
  const p21 = data.pins.find(p => p.n === 21);
  const sand = new THREE.Mesh(new THREE.CircleGeometry(6, 24),
    new THREE.MeshLambertMaterial({ color: 0xe4cfa4 }));
  sand.rotation.x = -Math.PI/2;
  sand.position.set(p21.x, 0.12, -p21.y);
  scene.add(sand);

  /* pins : sprites numerotes + tige */
  pinGroup = new THREE.Group();
  const stemMat = new THREE.MeshBasicMaterial({ color: C.bordeaux });
  data.pins.forEach(p => {
    const hBase = p.n === 1 ? 17 : [2,3,4,5,6,9,10,11,12].includes(p.n) ? 11 : 8;
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: makePinTexture(p.n, "base"), depthTest: false }));
    spr.scale.set(9, 9, 1);
    spr.position.set(p.x, hBase, -p.y);
    spr.userData = { n: p.n, hBase };
    spr.renderOrder = 50;
    pinGroup.add(spr);
    pinSprites[p.n] = spr;
    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.28, hBase, 5), stemMat);
    stem.position.set(p.x, hBase/2, -p.y);
    pinGroup.add(stem);
  });
  scene.add(pinGroup);

  /* interactions */
  raycaster = new THREE.Raycaster();
  pointer = new THREE.Vector2();
  const label3d = document.getElementById("label3d");
  const toPointer = (e) => {
    const r = wrap.getBoundingClientRect();
    pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  };
  wrap.addEventListener("pointermove", (e) => { toPointer(e); });
  wrap.addEventListener("click", (e) => {
    toPointer(e);
    raycaster.setFromCamera(pointer, camera);
    const hit = raycaster.intersectObjects(Object.values(pinSprites));
    if (hit.length) window.pinClickFrom3d(hit[0].object.userData.n);
  });

  /* HUD */
  const gp = document.getElementById("g-peint"), gs = document.getElementById("g-sat");
  gp.addEventListener("click", () => { groundPeint.visible = true; groundSat.visible = false; gp.classList.add("on"); gs.classList.remove("on"); });
  gs.addEventListener("click", () => { groundPeint.visible = false; groundSat.visible = true; gs.classList.add("on"); gp.classList.remove("on"); });
  document.getElementById("g-reset").addEventListener("click", () => {
    camera.position.set(-165, 185, 205);
    controls.target.set(-15, 0, -35);
  });

  addEventListener("resize", () => {
    if (!wrap.clientWidth) return;
    camera.aspect = wrap.clientWidth / wrap.clientHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(wrap.clientWidth, wrap.clientHeight);
  });

  let state = window.appState();
  window.map3d = {
    sync(s) { state = s; paint3d(state); },
    pause() { running = false; },
    resume() { running = true; loop(); },
  };

  function paint3d(s) {
    const L = window.lieuxData;
    for (const [n, spr] of Object.entries(pinSprites)) {
      const eq = L[n] ? L[n].eq : [];
      let style = "base", scale = 9, opacity = 1;
      if (s.eqFilter) {
        if (eq.includes(s.eqFilter)) { style = "lit"; scale = 11; }
        else opacity = 0.25;
      }
      if (s.selected && Number(n) === s.selected) { style = "sel"; scale = 12.5; }
      spr.material.map = makePinTexture(n, style);
      spr.material.opacity = opacity;
      spr.material.needsUpdate = true;
      spr.scale.set(scale, scale, 1);
    }
    /* label du pin selectionne */
    if (s.selected && pinSprites[s.selected]) {
      label3d.textContent = L[s.selected][s.lang];
      label3d.style.display = "block";
    } else label3d.style.display = "none";
  }

  function loop() {
    if (!running) return;
    requestAnimationFrame(loop);
    controls.update();
    /* hover */
    raycaster.setFromCamera(pointer, camera);
    const hit = raycaster.intersectObjects(Object.values(pinSprites));
    const over = hit.length ? hit[0].object.userData.n : null;
    if (over !== hoveredPin) {
      hoveredPin = over;
      wrap.style.cursor = over ? "pointer" : "grab";
    }
    /* label suit le pin selectionne */
    if (state.selected && pinSprites[state.selected]) {
      const v = pinSprites[state.selected].position.clone();
      v.y += 7;
      v.project(camera);
      label3d.style.left = ((v.x + 1) / 2 * wrap.clientWidth) + "px";
      label3d.style.top = ((-v.y + 1) / 2 * wrap.clientHeight) + "px";
    }
    renderer.render(scene, camera);
  }
  paint3d(state);
  running = true;
  loop();
};
</script>
</body>
</html>
